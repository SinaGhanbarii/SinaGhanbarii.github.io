bio: |
  Sina GhanbariPakdehi is an M.Sc. candidate in Chemical Engineering at
  Politecnico di Milano, specialising in Energy and Environment. His work
  focuses on process modelling, sustainable energy systems, desalination,
  environmental catalysis, and data-driven methods in chemical engineering.

  During a research exchange at the University of Bradford, he worked on the
  experimental and theoretical optimisation of a multistage
  humidification–dehumidification desalination system powered by solar energy.
  His broader experience includes catalytic-converter modelling,
  thermodynamic-property prediction using machine learning, process design,
  techno-economic analysis, and life-cycle assessment.

