        street: ""
        city: "Milan"
        region: "Lombardy"
        postal_code: ""
        country: "Italy"
      coordinates:
        latitude: null
        longitude: null
      phone: ""
    ai:
      allow:
        - /
      disallow: []
      note: "Public academic and professional information."
      contact: "mohammadsina.ghanbaripakdehi@mail.polimi.it"

  content:
