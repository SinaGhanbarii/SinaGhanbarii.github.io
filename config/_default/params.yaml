hugoblox:
  schema: "2.0"

  identity:
    name: "Sina GhanbariPakdehi"
    organization: ""
    type: person
    tagline: "Chemical Engineering | Process Modelling | Sustainable Energy Systems"
    description: "Academic website of Sina GhanbariPakdehi, a chemical engineering researcher working on process modelling, desalination, sustainable energy systems, and data-driven engineering."
