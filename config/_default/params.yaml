        foreground: ""
      footer:
        background: ""
        foreground: ""

  typography:
    pack: "academic"

  layout:
    radius: "md"
    spacing: "comfortable"
    avatar_shape: circle

  header:
    enable: true
    style: navbar
    sticky: true
    align: center
    search: true
    theme_toggle: true
    theme_picker: false
    language_switcher: false
    cta:
      enable: false
      text: ""
      url: ""

  footer:
    style: minimal
    language_switcher: false
